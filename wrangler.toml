# Este projeto Pages deve ser publicado em https://api.hermidamaia.adv.br
name = "newgit-pages"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "out"

[ai]
binding = "AI"

[[d1_databases]]
binding = "COPILOT_CONVERSATIONS_DB"
database_name = "hmadv-process-ai"
database_id = "1d61b217-289f-468d-9d29-40abb8a23a85"

[[kv_namespaces]]
binding = "CLOUDFLARE_DOCS_KV"
id = "3162a38a5bc24b85913891043f86d9c8"

[[r2_buckets]]
binding = "COPILOT_ATTACHMENTS_BUCKET"
bucket_name = "newgit-copilot-attachment"

# Este wrangler.toml representa o projeto Cloudflare Pages `newgit-pages`.
# O recurso `newgit` nao deve ser usado como alvo de deploy deste repositorio.
#
# No Pages Dashboard (projeto newgit-pages):
#   Build command: npm run build:pages
#   Build output directory: out
#   Deploy command: (deixe vazio — o Pages faz o deploy automaticamente)
#
# No Workers Dashboard (worker hmadv-process-ai — workers.cloudflare.com):
#   Build command: npm run build:pages
#   Deploy command: npm run deploy:worker
#   (O script deploy:worker chama: npx wrangler deploy --config workers/hmadv-process-ai/wrangler.toml)
#
# Importante:
#   `npm run build` sozinho nao deve ser tratado como contrato de publish do Pages.
#   Evite publicar apenas `out/` manualmente via `wrangler pages deploy out`.
#   Esse fluxo envia só os assets estáticos e pode deixar `functions/` e `/api/*`
#   fora do ar ou dessincronizados em produção.
#   Prefira o build conectado do Cloudflare Pages para publicar frontend + functions.
#
# Secrets configurados via Cloudflare Dashboard > Pages > Settings > Environment Variables:
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   GOOGLE_OAUTH_REFRESH_TOKEN
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   FRESHCHAT_API_BASE
#   FRESHCHAT_API_KEY
#   FRESHCHAT_ENABLE_WEB_MESSENGER
#   FRESHCHAT_WIDGET_SCRIPT_URL
#   FRESHCHAT_WEB_MESSENGER_TOKEN
#   FRESHCHAT_WEB_MESSENGER_HOST
#   FRESHCHAT_JWT_SECRET
#   RESEND_API_KEY
#   SITE_URL
#   FRESHSALES_API_BASE
#   FRESHSALES_API_KEY
#   FRESHSALES_ACCESS_TOKEN (opcional)
#   FRESHSALES_CONTACT_LIFECYCLE_FIELD
#   FRESHSALES_CONTACT_MEETING_FIELD
#   FRESHSALES_CONTACT_NEGOTIATION_FIELD
#   FRESHSALES_CONTACT_CLOSING_FIELD
#   FRESHSALES_CONTACT_CLIENT_FIELD
#   FRESHSALES_STAGE_VALUE_MAP
#   FRESHSALES_ACTIVITY_TYPE_BY_EVENT
#   FRESHSALES_APPOINTMENT_FIELD_MAP
#   PROCESS_AI_BASE (ou LAWDESK_AI_BASE_URL; deve apontar para https://ai.hermidamaia.adv.br)
#   HMDAV_AI_SHARED_SECRET (ou HMADV_AI_SHARED_SECRET; use o mesmo valor do worker HMADV IA)
#   HMADV_RUNNER_TOKEN
#   FREDDY_ACTION_SHARED_SECRET
#   SLACK_CLIENT_ID
#   SLACK_CLIENT_SECRET
#   SLACK_SIGNING_SECRET
#   SLACK_BOT_TOKEN
#   SLACK_ACCESS_TOKEN
#   SLACK_USER_TOKEN
#   SLACK_WEBHOOK_URL
#   ZOOM_ACCOUNT_ID
#   ZOOM_CLIENT_ID
#   ZOOM_CLIENT_SECRET
#   ZOOM_USER_ID
#   ZOOM_DEFAULT_TIMEZONE
#   WHATSAPP_PROVIDER
#   WHATSAPP_CLOUD_API_TOKEN
#   WHATSAPP_PHONE_NUMBER_ID
#   WHATSAPP_CLOUD_API_VERSION
#   As variaveis abaixo sao credenciais de deploy para o wrangler,
#   nao substituem as variaveis de runtime do worker HMADV IA.
#   CLOUDFLARE_WORKER_ACCOUNT_ID
#   CLOUDFLARE_WORKER_API_TOKEN
#   CLOUDFLARE_WORKERS_AI_MODEL (opcional)
# Bindings adicionais usados pelo Copilot:
#   COPILOT_CONVERSATIONS_DB (D1: hmadv-process-ai)
#   CLOUDFLARE_DOCS_KV (KV: newgit-cloudflare-docs)
#   COPILOT_ATTACHMENTS_BUCKET (R2: newgit-copilot-attachment)
