name: Validate Cloudflare Pages Runtime

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:pages

      - name: Post-build runtime note
        run: |
          echo "HMADV Market Ads frontend inclui fallback local quando /api/admin-market-ads nao estiver publicado."
          echo "O backend completo desse modulo ainda nao roda integralmente em Pages Functions com o conjunto atual de dependencias Node."

      - name: Validate Cloudflare deploy configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Guard against static-only Pages deploy
        run: |
          echo "::warning::Deploy automatico via 'wrangler pages deploy out' foi desabilitado."
          echo "::warning::Esse fluxo publica apenas assets estaticos e pode derrubar /api/* em producao."
          echo "::warning::Use o build conectado do Cloudflare Pages para publicar frontend + functions."

      - name: Remind post-deploy verification
        run: |
          echo "Depois do deploy, rode: npm run diagnose:pages-admin"
          echo "Confirme especialmente /api/admin-market-ads para saber se o modulo esta em modo local ou runtime server."
