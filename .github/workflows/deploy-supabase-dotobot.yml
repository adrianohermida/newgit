name: Deploy Supabase DotoBot Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/dotobot-slack/**"
      - "supabase/functions/dotobot-embed/**"
      - "supabase/functions/fc-ingest-conversations/**"
      - "supabase/functions/fc-last-conversation/**"
      - "supabase/functions/fc-update-conversation/**"
      - "supabase/functions/_shared/**"
      - ".github/workflows/deploy-supabase-dotobot.yml"
      - "scripts/hmadv-deploy-supabase-functions.ps1"
  workflow_dispatch:

concurrency:
  group: deploy-supabase-dotobot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dotobot-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.HMADV_SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase deploy secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing GitHub secret HMADV_SUPABASE_PROJECT_REF"
            exit 1
          fi

      - name: Deploy dotobot-slack
        run: npx supabase functions deploy dotobot-slack --use-api --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy dotobot-embed
        run: npx supabase functions deploy dotobot-embed --use-api --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy freshchat dotobot functions
        shell: bash
        run: |
          npx supabase functions deploy fc-ingest-conversations --use-api --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase functions deploy fc-last-conversation --use-api --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase functions deploy fc-update-conversation --use-api --project-ref "$SUPABASE_PROJECT_REF"
