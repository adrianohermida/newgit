name = "hmadv-api"
main = "src/index.ts"
compatibility_date = "2026-03-31"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Domínio customizado — todas as chamadas a api.hermidamaia.adv.br chegam aqui
routes = [
  { pattern = "api.hermidamaia.adv.br/*", custom_domain = true }
]

# ─── Bindings ────────────────────────────────────────────────────────────────

# Banco D1 compartilhado com o Pages (agendamentos, copilot, etc.)
[[d1_databases]]
binding = "DB"
database_name = "hmadv-process-ai"
database_id = "1d61b217-289f-468d-9d29-40abb8a23a85"

# KV — cache de documentação Cloudflare e outros
[[kv_namespaces]]
binding = "CLOUDFLARE_DOCS_KV"
id = "3162a38a5bc24b85913891043f86d9c8"

# R2 — anexos do Copilot
[[r2_buckets]]
binding = "COPILOT_ATTACHMENTS_BUCKET"
bucket_name = "newgit-copilot-attachment"

# Workers AI — usado pelo Copilot e Dotobot
[ai]
binding = "AI"

# Cron jobs — limpeza de agendamentos expirados e sincronização diária
[triggers]
crons = ["0 7 * * *", "0 */6 * * *"]

# ─── Variáveis públicas (não-secretas) ───────────────────────────────────────
[vars]
SITE_URL = "https://hermidamaia.adv.br"
CLOUDFLARE_WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

