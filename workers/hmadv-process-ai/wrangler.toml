name = "hmadv-process-ai"
main = "src/index.ts"
compatibility_date = "2026-03-31"
workers_dev = false

routes = [
  { pattern = "ai.hermidamaia.adv.br/*", zone_name = "hermidamaia.adv.br" }
]

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "dotobot-ai"

[[analytics_engine_datasets]]
binding = "ANALYTICS_ENGINE"
dataset = "HMADV"

[[d1_databases]]
binding = "hmadv_process_ai"
database_name = "hmadv-process-ai"
database_id = "1d61b217-289f-468d-9d29-40abb8a23a85"

[[r2_buckets]]
binding = "hmadv_process_ai_logs"
bucket_name = "hmadv-process-ai-logs"

[[kv_namespaces]]
binding = "CLOUDFLARE_KV_NAMESPACE"
id = "1e0740f44693445cbc798c0fe6e45a98"

[triggers]
crons = ["*/15 * * * *", "0 7 * * *"]

[vars]
CLOUDFLARE_WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
CLOUDFLARE_R2_ACCOUNT_ID = "b32bcc487dfca3a70fe57a75fa5ac482"
CLOUDFLARE_KV_NAMESPACE_ID = "1e0740f44693445cbc798c0fe6e45a98"
# CLOUDFLARE_S3_API is intentionally left as a runtime secret or dashboard variable.

