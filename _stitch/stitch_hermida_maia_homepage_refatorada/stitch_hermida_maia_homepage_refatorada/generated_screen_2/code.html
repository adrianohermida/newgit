    body {

      background: linear-gradient(135deg, #1B4332 0%, #050706 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      font-family: 'Cinzel', serif;
    }

    .gold-gradient-button {
      background: linear-gradient(to right, #C5A059, #8E6D2F);
      transition: all 0.3s ease;
    }

    .gold-gradient-button:hover {
      background: linear-gradient(to right, #D4AF37, #A67C00);
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
    }

    .input-focus-gold:focus {
      border-color: var(--gold-primary);
      ring-color: var(--gold-primary);
    }
